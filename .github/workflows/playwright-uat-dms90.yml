name: Playwright Tests - UAT DMS90
on:
  push:
    branches: [uat/dms90]
  pull_request:
    branches: [uat/dms90]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests for DMS90
      run: npx playwright test tests/dms90/
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-uat-dms90
        path: playwright-report/
        retention-days: 30